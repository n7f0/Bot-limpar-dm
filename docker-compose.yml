version: '3.8'
services:
  bot:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}   # opcional, se repo privado
    container_name: bot-limpar-dm-bot
    restart: always
    network_mode: bridge
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
    # Sem volumes – o código fica dentro da imagem